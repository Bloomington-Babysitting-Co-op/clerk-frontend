<!DOCTYPE html>
<html>
<head>
  <script src="/_env.js"></script>
  <title>Login – BBC Clerk</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>[x-cloak]{display:none!important;}</style>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <main class="flex-1 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow" x-data="loginForm" x-init="init">
      <h1 class="text-2xl font-bold mb-4">Log In</h1>

      <div x-show="!recoveryMode" x-cloak>
        <input type="email" x-model="email" placeholder="Email"
               class="border p-2 w-full mb-2" @keyup.enter="login">
        <input type="password" x-model="password" placeholder="Password"
               class="border p-2 w-full mb-2" @keyup.enter="login">
        <button @click="login"
                class="bg-blue-600 text-white px-4 py-2 w-full rounded">
          Log In
        </button>
        <button @click="forgotPassword"
                x-bind:disabled="resetting"
                class="mt-2 bg-yellow-600 text-white px-4 py-2 w-full rounded">
          <span x-text="resetting ? 'Sending...' : 'Forgot my password'"></span>
        </button>
        <p class="text-red-600 mt-2" x-text="error"></p>
      </div>

      <div x-show="recoveryMode" x-cloak class="space-y-2">
        <input type="password" x-model="recoveryPassword" placeholder="New password"
               class="border p-2 w-full mb-2">
        <button @click="setNewPassword"
                x-bind:disabled="processingRecovery"
                class="bg-green-600 text-white px-4 py-2 w-full rounded">
          <span x-text="processingRecovery ? 'Updating...' : 'Set new password'"></span>
        </button>
        <p class="text-red-600 mt-2" x-text="recoveryError"></p>
        <p class="text-green-600 mt-2" x-text="recoverySuccess"></p>
      </div>
    </div>
  </main>

  <script type="module" src="/js/auth.js"></script>
  <script src="https://unpkg.com/alpinejs" defer></script>
</body>
</html>
