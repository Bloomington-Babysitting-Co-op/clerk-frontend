<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://unpkg.com/alpinejs" defer></script>
  <script type="module" src="/js/auth.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-6">
  <h1 class="text-xl font-bold mb-4">Login</h1>

  <div x-data="loginForm">
    <input x-model="email" placeholder="Email" class="border p-2 block mb-2">
    <input x-model="password" type="password" placeholder="Password" class="border p-2 block mb-2">
    <button @click="login" class="bg-blue-600 text-white px-4 py-2">Login</button>
    <p class="text-red-600 mt-2" x-text="error"></p>
  </div>
</body>
</html>
