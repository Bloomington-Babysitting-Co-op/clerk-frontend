<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/_env.js"></script>
  <script src="/js/fast-auth.js"></script>
  <title>New Entry – BBC Clerk</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6 max-w-3xl mx-auto w-full">
    <div class="bg-white p-6 rounded-lg shadow">
      <h1 class="text-2xl font-bold mb-4">New Entry</h1>

      <select id="request-select" class="border p-2 w-full mb-4" required></select>

      <div class="w-full flex flex-col gap-3 md:grid md:gap-x-4 md:gap-y-2 md:grid-cols-[1fr_auto_1fr]">
        <label for="from-family" class="order-1 md:order-none block font-semibold md:justify-self-end">From</label>
        <div class="hidden md:block"></div>
        <label for="to-family" class="order-4 md:order-none block font-semibold">To</label>
        <div class="order-2 md:order-none min-w-0">
          <input id="from-family" type="text" readonly class="border p-2 w-full bg-gray-100 text-gray-800">
        </div>
        <span class="order-3 md:order-none text-gray-600 font-bold select-none px-2 text-2xl self-center md:shrink-0">→</span>
        <div class="order-5 md:order-none min-w-0">
          <input id="to-family" type="text" readonly class="border p-2 w-full text-gray-800">
        </div>
      </div>
      <input id="from-family-id" type="hidden">
      <input id="to-family-id" type="hidden">

      <label class="block mb-2 font-semibold">Date <span class="text-red-600">*</span></label>
      <input id="entry-date" type="date" required class="border p-2 w-full mb-4">

      <label class="block mb-2 font-semibold">Hours <span class="text-red-600">*</span></label>
      <input id="entry-hours" type="number" step="0.25" min="0.25" required class="border p-2 w-full mb-4">

      <div class="flex flex-wrap items-center gap-4 mb-4">
        <label id="entry-add-drive-time-label" class="inline-flex items-center gap-2 text-sm">
          <input id="entry-add-drive-time" type="checkbox">
          <span>Add 30min Drive Time</span>
        </label>
        <label id="entry-add-meal-served-label" class="inline-flex items-center gap-2 text-sm">
          <input id="entry-add-meal-served" type="checkbox">
          <span>Add 30min Meal Served</span>
        </label>
      </div>

      <label class="block mb-2 font-semibold">Notes</label>
      <textarea id="entry-notes" class="border p-2 w-full mb-4" rows="2" placeholder="Optional notes..."></textarea>

      <button id="create-entry-btn" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Create Entry</button>
      <p id="entry-error" class="text-red-600 mt-3"></p>
    </div>
  </main>

  <script type="module">
    import { mountNewEntryPage } from "/js/entries.js";
    await mountNewEntryPage();
  </script>
</body>
</html>
