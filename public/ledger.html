<!DOCTYPE html>
<html>
<head>
  <title>Ledger – BBC Ledger</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    <h1 class="text-3xl font-bold mb-8">Ledger</h1>

    <div id="ledger-list" class="grid gap-4"></div>
  </main>

  <script type="module">
    import { setupNavbar } from "/js/utils.js";
    import { requireAuth } from "/js/auth.js";
    import { listLedgerInto } from "/js/ledger.js";

    await requireAuth();
    await setupNavbar("navbar");
    listLedgerInto("ledger-list");
  </script>

  <script src="https://unpkg.com/alpinejs" defer></script>
</body>
</html>
