<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/_env.js"></script>
  <script src="/js/fast-auth.js"></script>
  <title>Ledger – BBC Clerk</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar" class="bg-indigo-600 text-white shadow">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" class="bg-white text-indigo-600 text-2xl font-bold hover:bg-blue-300 px-4 py-1 rounded" title="Go to dashboard">BBC Clerk</a>
      </div>
      <div class="flex gap-2 items-center" data-nav-links>
        <a href="/requests.html" class="bg-white text-blue-600 hover:bg-blue-300 px-4 py-2 rounded">Requests</a>
        <a href="/ledger.html" class="bg-white text-blue-600 hover:bg-blue-300 px-4 py-2 rounded">Ledger</a>
        <a href="/families.html" class="bg-white text-blue-600 hover:bg-blue-300 px-4 py-2 rounded">Families</a>
        <span data-admin-slot></span>
      </div>
    </div>
  </nav>

  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-3xl font-bold">Ledger</h1>
      <a href="/entry-new.html" class="bg-blue-600 text-white px-4 py-2 rounded">New Entry</a>
    </div>

    <div class="bg-white border p-4 rounded-lg shadow mb-6">
      <div class="grid md:grid-cols-5 gap-3 items-end">
        <div>
          <label class="block text-sm font-medium mb-1">Start Date</label>
          <input id="ledger-start-date" type="date" class="border p-2 w-full rounded">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">End Date</label>
          <input id="ledger-end-date" type="date" class="border p-2 w-full rounded">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Family</label>
          <select id="ledger-family-select" class="border p-2 w-full rounded">
            <option value="">All Families</option>
          </select>
        </div>
        <button id="ledger-apply-filter-btn" class="bg-gray-600 text-white px-4 py-2 rounded">Apply Filter</button>
        <button id="ledger-export-csv-btn" class="bg-green-600 text-white px-4 py-2 rounded">Export CSV</button>
      </div>
      <p id="ledger-error" class="text-red-600 mt-2"></p>
    </div>

    <div class="bg-white border p-4 rounded-lg shadow mb-6">
      <div id="ledger-balances"></div>
    </div>

    <div class="bg-white border p-4 rounded-lg shadow mb-6">
      <div id="ledger-list"></div>
    </div>
  </main>

  <script type="module">
    import { mountLedgerPage } from "/js/ledger.js";
    await mountLedgerPage();
  </script>

  <script src="https://unpkg.com/alpinejs" defer></script>
</body>
</html>
