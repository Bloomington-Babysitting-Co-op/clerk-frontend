<!DOCTYPE html>
<html>
<head>
  <title>View Request – BBC Ledger</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script>
    // Early auth check before body renders
    (async () => {
      const { data } = await fetch('https://jljuisgrqpwsuuyrkgdd.supabase.co/auth/v1/user', {
        headers: { 'Authorization': 'Bearer ' + (JSON.parse(localStorage.getItem('supabase.auth.token') || '{}').access_token || '') }
      }).then(r => r.json()).catch(() => ({}));
      if (!data?.id) window.location.href = '/';
    })();
  </script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    <div id="request-container"></div>
  </main>

  <script type="module">
    import { setupNavbar } from "/js/utils.js";
    import { requireAuth } from "/js/auth.js";
    import { loadRequestInto } from "/js/requests.js";

    await requireAuth();
    setupNavbar("navbar");
    loadRequestInto("request-container");
  </script>

  <script src="https://unpkg.com/alpinejs" defer></script>
</body>
</html>
