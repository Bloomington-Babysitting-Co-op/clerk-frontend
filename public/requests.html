<!DOCTYPE html>
<html>
<head>
  <title>Requests – BBC Ledger</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-3xl font-bold">Requests</h1>
      <a href="/request_new.html" class="bg-blue-600 text-white px-4 py-2 rounded" style="display:none;">New Request</a>
    </div>

    <div id="requests-list" class="grid gap-4"></div>
  </main>

  <script type="module">
    import { setupNavbar } from "/js/utils.js";
    import { requireAuth } from "/js/auth.js";
    import { listRequestsInto } from "/js/requests.js";

    await setupNavbar("navbar");
    await requireAuth();
    listRequestsInto("requests-list");
  </script>

  <script src="https://unpkg.com/alpinejs" defer></script>
</body>
</html>
