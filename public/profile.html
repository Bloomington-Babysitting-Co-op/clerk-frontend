<!DOCTYPE html>
<html>
<head>
  <script src="/_env.js"></script>
  <title>Profile – BBC Clerk</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6 max-w-5xl mx-auto w-full">
    <div class="space-y-6">
      <div class="mb-6">
        <h1 class="text-3xl font-bold">Profile</h1>
      </div>

      <section class="bg-white p-6 rounded-lg shadow space-y-4">
        <div class="border rounded p-4 space-y-3">
          <h3 class="text-lg font-semibold">Family</h3>
          <div>
            <label class="block text-sm font-medium mb-1">Family Name <span class="text-red-600">*</span></label>
            <input id="profile-family-name" type="text" class="border p-2 w-full rounded">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Linked Family Users</label>
            <p id="profile-linked-family-emails" class="text-sm text-gray-800 border rounded p-2 bg-gray-50">Loading…</p>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Address <span class="text-red-600">*</span></label>
            <textarea id="profile-address" class="border p-2 w-full rounded" rows="2"></textarea>
          </div>
          <div>
            <div class="mb-1">
              <label class="block text-sm font-medium">Emergency Contacts <span class="text-red-600">*</span></label>
            </div>
            <div id="profile-emergency-contacts-list" class="space-y-3"></div>
            <div class="mt-2">
              <button id="profile-add-emergency-contact-btn" type="button" class="bg-blue-600 text-white px-2 py-0.5 rounded">Additional Contact</button>
            </div>
          </div>
          <div>
            <div class="mb-1">
              <label class="block text-sm font-medium">Children <span class="text-red-600">*</span></label>
            </div>
            <div id="profile-children-list" class="space-y-3"></div>
            <div class="mt-2">
              <button id="profile-add-child-btn" type="button" class="bg-blue-600 text-white px-2 py-0.5 rounded">Additional Child</button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Pets</label>
            <textarea id="profile-pets" class="border p-2 w-full rounded" rows="2"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Notes</label>
            <textarea id="profile-notes" class="border p-2 w-full rounded" rows="3"></textarea>
          </div>

          <input type="hidden" id="profile-family-photo-storage-path" value="">
          <div class="flex items-start gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Family Photo</label>
              <input id="profile-photo-input" type="file" accept="image/*" class="block mb-2">
              <button id="profile-photo-upload-btn" type="button" class="bg-blue-600 text-white px-2 py-1 rounded">Upload Photo</button>
              <p id="profile-photo-message" class="text-sm text-gray-800 mt-2"></p>
            </div>
            <div class="w-24 h-24 border rounded overflow-hidden flex items-center justify-center">
              <img id="profile-photo-preview" src="" alt="Photo preview" class="object-cover w-full h-full hidden">
              <span id="profile-photo-placeholder" class="text-xs text-gray-500">No photo</span>
            </div>
          </div>

          <div id="profile-admin-metadata" class="border rounded p-3 bg-gray-50 text-sm text-gray-800">
            <p>Joined: <span id="profile-admin-joined">N/A</span></p>
            <p>Last background check: <span id="profile-admin-background">N/A</span></p>
            <p>Last dues payment: <span id="profile-admin-dues">N/A</span></p>
          </div>
        </div>

        <div class="border rounded p-4 space-y-3">
          <h3 class="text-lg font-semibold">Account</h3>
          <div class="grid md:grid-cols-2 gap-3">
            <div>
                <label class="block text-sm font-medium mb-1">Parent Name <span class="text-red-600">*</span></label>
                <input id="profile-parent-name" type="text" class="border p-2 w-full rounded">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Phone <span class="text-red-600">*</span></label>
              <input id="profile-phone" type="text" class="border p-2 w-full rounded">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Email</label>
            <input id="profile-email" type="email" class="border p-2 w-full rounded bg-gray-100" disabled>
          </div>
          <div class="grid md:grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium mb-1">New Email</label>
              <input id="profile-new-email" type="email" class="border p-2 w-full rounded">
            </div>
            <div class="flex items-end">
              <button id="profile-update-email-btn" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Change Email</button>
            </div>
          </div>
          <div class="grid md:grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium mb-1">New Password</label>
              <input id="profile-new-password" type="password" class="border p-2 w-full rounded">
            </div>
            <div class="flex items-end">
              <button id="profile-update-password-btn" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Change Password</button>
            </div>
          </div>
          <p id="profile-account-message" class="text-sm text-gray-800"></p>
        </div>

        <div class="border rounded p-4 space-y-3">
          <h3 class="text-lg font-semibold">Email Preferences</h3>
          <label class="flex gap-2 items-start"><input id="email-request-offered" type="checkbox" class="mt-1"><span>Your request has an offer</span></label>
          <label class="flex gap-2 items-start"><input id="email-request-unoffered" type="checkbox" class="mt-1"><span>Your request will expire in 48 hours</span></label>
          <label class="flex gap-2 items-start"><input id="email-request-expired" type="checkbox" class="mt-1"><span>Your request has expired</span></label>
          <label class="flex gap-2 items-start"><input id="email-offer-assigned" type="checkbox" class="mt-1"><span>Your offer has been assigned</span></label>
          <label class="flex gap-2 items-start"><input id="email-offer-completed" type="checkbox" class="mt-1"><span>Your offer has been completed</span></label>
          <label class="flex gap-2 items-start"><input id="email-ledger-change" type="checkbox" class="mt-1"><span>Your balance has changed</span></label>
          <label class="flex gap-2 items-start"><input id="email-request-new" type="checkbox" class="mt-1"><span>New request has been created</span></label>
          <label class="flex gap-2 items-start"><input id="email-offer-change" type="checkbox" class="mt-1"><span>Request you offered on was changed</span></label>
          <label class="flex gap-2 items-start"><input id="email-midmonth-inactive" type="checkbox" class="mt-1"><span>Mid-month inactivity reminder</span></label>
        </div>
      </section>

      <div class="bg-white p-6 rounded-lg shadow space-y-3">
        <button id="profile-save-btn" class="bg-blue-600 text-white px-4 py-2 rounded w-full cursor-pointer">Save Profile</button>
        <button id="profile-logout-btn" class="bg-red-600 text-white px-4 py-2 rounded w-full cursor-pointer">Log Out</button>
        <p id="profile-save-message" class="text-sm text-gray-800"></p>
      </div>
    </div>
  </main>

  <script type="module">
    import { setupNavbar } from "/js/utils.js";
    import { mountProfilePage } from "/js/profile.js";

    await setupNavbar("navbar");
    await mountProfilePage();
  </script>
</body>
</html>
