<!DOCTYPE html>
<html>
<head>
  <title>New Request – BBC Ledger</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="p-6 max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-4">Create New Request</h1>

  <div x-data="newRequestForm">
    <label class="block mb-2">Start Time</label>
    <input type="datetime-local" x-model="start_time" class="border p-2 w-full mb-4">

    <label class="block mb-2">End Time</label>
    <input type="datetime-local" x-model="end_time" class="border p-2 w-full mb-4">

    <label class="block mb-2">Notes</label>
    <textarea x-model="notes" class="border p-2 w-full mb-4"></textarea>

    <button @click="create"
            class="bg-blue-600 text-white px-4 py-2 w-full">
      Create Request
    </button>

    <p class="text-red-600 mt-2" x-text="error"></p>
  </div>

  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/requests.js"></script>
  <script src="https://unpkg.com/alpinejs" defer></script>
</body>
</html>
