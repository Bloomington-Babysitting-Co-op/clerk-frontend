<!DOCTYPE html>
<html>
<head>
  <title>New Request – BBC Ledger</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow">
      <h1 class="text-2xl font-bold mb-4">Create New Request</h1>

      <div x-data="newRequestForm">
        <label class="block mb-2 font-semibold">Start Time</label>
        <input type="datetime-local" x-model="start_time" class="border p-2 w-full mb-4">

        <label class="block mb-2 font-semibold">End Time</label>
        <input type="datetime-local" x-model="end_time" class="border p-2 w-full mb-4">

        <label class="block mb-2 font-semibold">Notes</label>
        <textarea x-model="notes" class="border p-2 w-full mb-4"></textarea>

        <button @click="create"
                class="bg-blue-600 text-white px-4 py-2 w-full rounded">
          Create Request
        </button>

        <p class="text-red-600 mt-2" x-text="error"></p>
      </div>
    </div>
  </main>

  <script type="module">
    import { setupNavbar } from "/js/utils.js";
    import { requireAuth } from "/js/auth.js";
    
    await requireAuth();
    setupNavbar("navbar");
  </script>

  <script type="module" src="/js/requests.js"></script>
  <script src="https://unpkg.com/alpinejs" defer></script>
</body>
</html>
