<!DOCTYPE html>
<html>
<head>
  <title>BBC Ledger</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    <div x-data="dashboardState" x-init="init">
      <!-- Dashboard -->
      <div class="space-y-8">
        <!-- Summary Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-2">Hours Balance</h2>
            <p class="text-3xl font-bold text-blue-600" x-text="hoursBalance + ' hours'"></p>
          </div>

          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-2">Active This Month</h2>
            <p class="text-3xl font-bold" :class="activeThisMonth ? 'text-green-600' : 'text-red-600'" x-text="activeThisMonth ? 'Yes' : 'No'"></p>
          </div>

          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">External Links</h2>
            <div class="space-y-1 text-sm">
              <div class="text-blue-600">
                <a href="https://docs.google.com/spreadsheets/d/1j1sRLqTYlOJJsdrh0UVyHjOMN4Wrs-GHlUU77FVWSSk" target="_blank" rel="noopener noreferrer" class="underline hover:text-blue-700">Roster</a>
                <span class="mx-2 text-gray-400">•</span>
                <a href="https://docs.google.com/presentation/d/11q4GuguHfrANRxbB5el9SDp7hzUzYK1rZUcZrumCKl8" target="_blank" rel="noopener noreferrer" class="underline hover:text-blue-700">Directory</a>
                <span class="mx-2 text-gray-400">•</span>
                <a href="https://goo.gl/maps/31PHeVPHckCe1Rwv8" target="_blank" rel="noopener noreferrer" class="underline hover:text-blue-700">Map</a>
              </div>
              <div class="text-blue-600">
                <a href="https://groups.google.com/u/1/g/bloomingtonbabysittingco-op" target="_blank" rel="noopener noreferrer" class="underline hover:text-blue-700">Google Groups</a>
                <span class="mx-2 text-gray-400">•</span>
                <a href="https://drive.google.com/drive/folders/144Uxgk9NSpGEji93FCJM6C3hj0-ZztWl" target="_blank" rel="noopener noreferrer" class="underline hover:text-blue-700">Google Drive</a>
              </div>
            </div>
          </div>
        </div>

        <!-- Requests Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Open Requests</h2>
            <div id="other-requests-list"></div>
          </div>

          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Your Requests</h2>
            <div id="family-requests-list"></div>
          </div>

          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Your Offers</h2>
            <div id="family-offers-list"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { setupNavbar } from "/js/utils.js";
    import { requireAuth } from "/js/auth.js";
    
    await setupNavbar("navbar");
    await requireAuth();
  </script>

  <script type="module" src="/js/auth.js"></script>
  <script src="https://unpkg.com/alpinejs" defer></script>
</body>
</html>
