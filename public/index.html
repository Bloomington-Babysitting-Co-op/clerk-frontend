<!DOCTYPE html>
<html>
<head>
  <title>BBC Ledger</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="p-6">
  <h1 class="text-2xl font-bold mb-4">Bloomington Babysitting Co-op Ledger</h1>

  <div x-data="authState" x-init="init">
    <template x-if="!session">
      <a href="/login.html" class="text-blue-600 underline">Log in</a>
    </template>

    <template x-if="session">
      <div>
        <p class="mb-4">Welcome!</p>
        <a href="/requests.html" class="text-blue-600 underline">View Requests</a><br>
        <a href="/ledger.html" class="text-blue-600 underline">View Ledger</a><br>
        <button @click="logout" class="mt-4 text-red-600 underline">Log out</button>
      </div>
    </template>
  </div>

  <script type="module" src="/js/auth.js"></script>
  <script src="https://unpkg.com/alpinejs" defer></script>
</body>
</html>
