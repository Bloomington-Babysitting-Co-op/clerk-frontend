<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/_env.js"></script>
  <script src="/js/fast-auth.js"></script>
  <title>BBC Clerk</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>
  <div id="dashboard-banner" class="hidden max-w-6xl mx-auto w-full px-6 mt-4"></div>

  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    <div x-data="dashboardState" x-init="init">
      <!-- Dashboard -->
      <div class="space-y-8">
        <!-- Summary Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-2">Active This Month</h2>
            <p class="text-3xl font-bold" :class="activeThisMonth ? 'text-green-600' : 'text-red-600'" x-text="activeThisMonth ? 'Yes' : 'No'"></p>
          </div>

          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-2">Hours Balance</h2>
            <p class="text-3xl font-bold" :class="hoursBalance < 0 ? 'text-red-600' : 'text-green-600'" x-text="hoursBalance + ' hours'"></p>
          </div>

          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">External Links</h2>
            <div class="space-y-1 text-sm">
              <div id="dashboard-external-links"></div>
            </div>
          </div>
        </div>

        <!-- Requests Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Available Requests</h2>
            <div id="other-requests-list"></div>
          </div>

          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Your Requests</h2>
            <div id="family-requests-list"></div>
          </div>

          <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Your Offers</h2>
            <div id="family-offers-list"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { requireAuth } from "/js/auth.js";
    import { setupNavbar } from "/js/utils.js";
    import { mountBanner } from "/js/banner.js";
    import { mountLinks } from "/js/dashboard-links.js";

    await requireAuth();
    await setupNavbar("navbar");
    await mountBanner('dashboard-banner');
    await mountLinks('dashboard-external-links');
  </script>

  <script src="https://unpkg.com/alpinejs" defer></script>
</body>
</html>
