<!DOCTYPE html>
<html>
<head>
  <title>New Entry – BBC Ledger</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6 max-w-3xl mx-auto w-full">
    <div class="bg-white p-6 rounded-lg shadow">
      <h1 class="text-2xl font-bold mb-4">New Entry</h1>
      <p class="text-sm text-gray-600 mb-3">Submit an hours transfer. Non-admin submissions always use you as the recipient.</p>
      <p id="entry-admin-note" class="text-sm text-blue-700 mb-3" style="display:none;">Admin mode: you can transfer hours from any user to any user.</p>

      <label class="block mb-2 font-semibold">Prefill from Completed Request (Optional)</label>
      <select id="prefill-request" class="border p-2 w-full mb-4"></select>

      <label class="block mb-2 font-semibold">From User</label>
      <select id="from-user" class="border p-2 w-full mb-4"></select>

      <label class="block mb-2 font-semibold">To User</label>
      <select id="to-user" class="border p-2 w-full mb-4"></select>
      <p id="to-user-help" class="text-xs text-gray-600 mb-3"></p>

      <label class="block mb-2 font-semibold">Hours</label>
      <input id="hours" type="number" step="0.25" min="0" class="border p-2 w-full mb-4">

      <label class="block mb-2 font-semibold">Timestamp (Optional)</label>
      <input id="timestamp" type="datetime-local" class="border p-2 w-full mb-4">
      <p id="timestamp-help" class="text-xs text-gray-600 mb-3"></p>

      <button id="create-entry-btn" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Create Entry</button>
      <p id="entry-error" class="text-red-600 mt-3"></p>
    </div>
  </main>

  <script type="module">
    import { setupNavbar } from "/js/utils.js";
    import { mountNewEntryPage } from "/js/entries.js";

    await setupNavbar("navbar");
    await mountNewEntryPage();
  </script>
</body>
</html>
