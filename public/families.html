<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/_env.js"></script>
  <script src="/js/fast-auth.js"></script>
  <title>Families – BBC Clerk</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar" class="bg-indigo-600 text-white shadow">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" class="bg-white text-indigo-600 text-2xl font-bold hover:bg-blue-300 px-4 py-1 rounded" title="Go to dashboard">BBC Clerk</a>
      </div>
      <div class="flex gap-2 items-center" data-nav-links>
        <a href="/requests.html" class="bg-white text-blue-600 hover:bg-blue-300 px-4 py-2 rounded">Requests</a>
        <a href="/ledger.html" class="bg-white text-blue-600 hover:bg-blue-300 px-4 py-2 rounded">Ledger</a>
        <a href="/families.html" class="bg-white text-blue-600 hover:bg-blue-300 px-4 py-2 rounded">Families</a>
        <span data-admin-slot></span>
      </div>
    </div>
  </nav>

  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center space-x-3">
        <button id="families-toggle-all" class="w-8 h-8 flex items-center justify-center bg-gray-200 rounded border" aria-pressed="false" aria-label="Expand all families">+</button>
        <h1 class="text-3xl font-bold">Families</h1>
      </div>
      <a href="/profile.html" class="bg-blue-600 text-white px-4 py-2 rounded">Edit Profile</a>
    </div>

    <div id="families-list" class="grid gap-4"></div>
    
    <div class="mt-6 flex justify-end max-w-6xl mx-auto w-full">
      <button id="families-export-csv" class="bg-green-600 text-white px-4 py-2 rounded">Export CSV</button>
    </div>
  </main>

  <script type="module">
    import { mountFamiliesPage } from "/js/families.js";
    await mountFamiliesPage("families-list");
  </script>
</body>
</html>
