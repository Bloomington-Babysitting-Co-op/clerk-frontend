<!DOCTYPE html>
<html>
<head>
  <title>Admin – BBC Clerk</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    <h1 class="text-3xl font-bold text-center">Admin</h1>

    <section class="flex-1 p-6 max-w-3xl mx-auto w-full">
      <div class="bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-4">Mass Entry</h1>

        <form id="mass-ledger-form" class="space-y-4 mt-4">
          <div class="w-full flex flex-col gap-3 md:grid md:gap-x-4 md:gap-y-2 md:grid-cols-[1fr_auto_1fr]">
            <label for="from-families" class="order-1 md:order-none block font-semibold md:justify-self-end">From</label>
            <div class="hidden md:block"></div>
            <label for="to-families" class="order-4 md:order-none block font-semibold">To</label>
            <div class="order-2 md:order-none min-w-0">
              <select id="from-families" class="border p-2 w-full" multiple size="6"></select>
            </div>
            <span class="order-3 md:order-none text-gray-600 font-bold select-none px-2 text-2xl self-center md:shrink-0">→</span>
            <div class="order-5 md:order-none min-w-0">
              <select id="to-families" class="border p-2 w-full" multiple size="6"></select>
            </div>
          </div>

          <label class="block mb-2 font-semibold">Date <span class="text-red-600">*</span></label>
          <input id="mass-entry-date" type="date" required class="border p-2 w-full mb-4">

          <label class="block mb-2 font-semibold">Hours <span class="text-red-600">*</span></label>
          <input id="mass-entry-hours" type="number" step="0.25" min="0.25" required class="border p-2 w-full mb-4">

          <label class="block mb-2 font-semibold">Notes <span class="text-red-600">*</span></label>
          <textarea id="mass-entry-notes" required class="border p-2 w-full mb-4" rows="2" placeholder="Required notes..."></textarea>

          <button id="mass-create-btn" type="submit" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Create Entries</button>
          <p id="mass-entry-error" class="text-red-600 mt-3"></p>
          <p id="mass-entry-success" class="text-green-600 mt-3"></p>
        </form>
    </section>

    <section class="flex-1 p-6 max-w-3xl mx-auto w-full">
      <div class="bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-4">Edit Families</h1>
        <div class="flex items-center justify-between mb-3">
          <h1 class="text-2xl font-bold">Edit Families</h1>
          <div class="flex items-center space-x-2">
            <button id="families-admin-expand-all" class="bg-gray-200 text-gray-800 px-3 py-1 rounded">Expand All</button>
            <button id="families-admin-collapse-all" class="bg-gray-200 text-gray-800 px-3 py-1 rounded">Collapse All</button>
          </div>
        </div>
        <p id="families-admin-families-status" class="text-sm text-gray-700"></p>
        <div id="families-admin-families-list" class="space-y-3"></div>
      </div>
    </section>

    <section class="flex-1 p-6 max-w-3xl mx-auto w-full">
      <div class="bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-4">Edit Users</h1>
        <p id="families-admin-users-status" class="text-sm text-gray-700"></p>
        <div id="families-admin-users-list" class="space-y-3"></div>
      </div>
    </section>

    <section class="bg-white p-6 rounded-lg shadow space-y-3">
      <h2 class="text-xl font-semibold">Create Family</h2>
      <div class="grid md:grid-cols-[1fr_auto] gap-3">
        <input id="families-admin-new-family-name" type="text" class="border rounded p-2" placeholder="Family name">
        <button id="families-admin-create-family-btn" class="bg-blue-600 text-white px-4 py-2 rounded">Create Family</button>
      </div>
      <p id="families-admin-family-create-status" class="text-sm text-gray-700"></p>
    </section>

    <section class="bg-white p-6 rounded-lg shadow space-y-3">
      <h2 class="text-xl font-semibold">Create User</h2>
      <div class="grid md:grid-cols-2 gap-3">
        <input id="families-admin-new-user-email" type="email" class="border rounded p-2" placeholder="Email">
        <input id="families-admin-new-user-password" type="password" class="border rounded p-2" placeholder="Password">
      </div>
      <div class="grid md:grid-cols-[1fr_auto] gap-3">
        <select id="families-admin-new-user-family" class="border rounded p-2"></select>
        <button id="families-admin-create-user-btn" class="bg-blue-600 text-white px-4 py-2 rounded">Create User</button>
      </div>
      <p id="families-admin-user-create-status" class="text-sm text-gray-700"></p>
    </section>
  </main>

  <script type="module">
    import { mountAdminPage } from "/js/admin.js";

    await mountAdminPage();
  </script>
</body>
</html>
