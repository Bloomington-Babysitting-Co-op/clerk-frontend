<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/_env.js"></script>
  <script src="/js/fast-auth.js"></script>
  <title>Admin – BBC Clerk</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar" class="bg-indigo-600 text-white shadow">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="/" class="bg-white text-indigo-600 text-2xl font-bold hover:bg-blue-300 px-4 py-1 rounded" title="Go to dashboard">BBC Clerk</a>
      </div>
      <div class="flex gap-2 items-center" data-nav-links>
        <a href="/requests.html" class="bg-white text-blue-600 hover:bg-blue-300 px-4 py-2 rounded">Requests</a>
        <a href="/ledger.html" class="bg-white text-blue-600 hover:bg-blue-300 px-4 py-2 rounded">Ledger</a>
        <a href="/families.html" class="bg-white text-blue-600 hover:bg-blue-300 px-4 py-2 rounded">Families</a>
        <span data-admin-slot></span>
      </div>
    </div>
  </nav>

  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    <h1 class="flex-1 p-3 max-w-3xl mx-auto w-full bg-red-600 text-white text-center text-3xl font-bold rounded-lg shadow">Admin</h1>

    <section class="flex-1 p-6 max-w-3xl mx-auto w-full">
      <div class="bg-white p-6 rounded-lg shadow">
        <h1 class="text-3xl font-bold mb-4">Mass Entry</h1>

        <form id="mass-ledger-form" class="space-y-4 mt-4">
          <div class="w-full flex flex-col gap-3 md:grid md:gap-x-4 md:gap-y-2 md:grid-cols-[1fr_auto_1fr]">
            <label for="from-families" class="order-1 md:order-none block font-semibold md:justify-self-end">From</label>
            <div class="hidden md:block"></div>
            <label for="to-families" class="order-4 md:order-none block font-semibold">To</label>
            <div class="order-2 md:order-none min-w-0">
              <div class="relative">
                <div id="from-families-chips" class="border p-2 w-full rounded min-h-[44px] flex flex-wrap gap-1 items-center"></div>
                <input id="from-families-input" type="text" placeholder="Search families..." class="mt-2 md:mt-0 p-2 w-full border rounded" autocomplete="off">
                <ul id="from-families-dropdown" class="hidden absolute left-0 right-0 bg-white border mt-1 max-h-48 overflow-auto z-20"></ul>
                <select id="from-families" class="hidden" multiple size="6"></select>
              </div>
            </div>
            <span class="order-3 md:order-none text-gray-600 font-bold select-none px-2 text-2xl self-center md:shrink-0">→</span>
            <div class="order-5 md:order-none min-w-0">
              <div class="relative">
                <div id="to-families-chips" class="border p-2 w-full rounded min-h-[44px] flex flex-wrap gap-1 items-center"></div>
                <input id="to-families-input" type="text" placeholder="Search families..." class="mt-2 md:mt-0 p-2 w-full border rounded" autocomplete="off">
                <ul id="to-families-dropdown" class="hidden absolute left-0 right-0 bg-white border mt-1 max-h-48 overflow-auto z-20"></ul>
                <select id="to-families" class="hidden" multiple size="6"></select>
              </div>
            </div>
          </div>

          <label class="block mb-2 font-semibold">Date <span class="text-red-600">*</span></label>
          <input id="mass-entry-date" type="date" required class="border p-2 w-full mb-4">

          <label class="block mb-2 font-semibold">Hours <span class="text-red-600">*</span></label>
          <input id="mass-entry-hours" type="number" step="0.25" min="0.25" required class="border p-2 w-full mb-4">

          <label class="block mb-2 font-semibold">Notes <span class="text-red-600">*</span></label>
          <textarea id="mass-entry-notes" required class="border p-2 w-full mb-4" rows="2" placeholder="Required notes..."></textarea>

          <button id="mass-create-btn" type="submit" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Create Entries</button>
          <p id="mass-entry-error" class="text-red-600 mt-3"></p>
          <p id="mass-entry-success" class="text-green-600 mt-3"></p>
        </form>
    </section>

    <section class="flex-1 p-6 max-w-3xl mx-auto w-full">
      <div class="bg-white p-6 rounded-lg shadow">
        <div class="flex items-center space-x-3">
          <button id="families-admin-toggle-all" class="w-8 h-8 flex items-center justify-center bg-gray-200 rounded border" aria-pressed="false" aria-label="Expand all families">+</button>
          <h1 class="text-3xl font-bold">Modify Families</h1>
          <div class="ml-auto flex items-center">
            <label class="flex items-center text-sm text-gray-800"><span>Show Inactive</span><input type="checkbox" class="show-inactive-families-toggle ml-2" aria-label="Show inactive families"></label>
          </div>
        </div>
        <div class="grid md:grid-cols-[1fr_auto] gap-3 py-4">
          <input id="families-admin-new-family-name" type="text" class="border rounded p-2" placeholder="Family name">
          <button id="families-admin-create-family-btn" class="bg-blue-600 text-white px-4 py-2 rounded">Create Family</button>
        </div>
        <p id="family-admin-create-status" class="text-sm text-gray-800"></p>
        <p id="families-admin-edit-status" class="text-sm text-gray-800"></p>
        <div id="families-admin-edit-list" class="space-y-3"></div>
      </div>
    </section>

    <section class="flex-1 p-6 max-w-3xl mx-auto w-full">
      <div class="bg-white p-6 rounded-lg shadow">
        <div class="flex items-center space-x-3">
          <button id="users-admin-toggle-all" class="w-8 h-8 flex items-center justify-center bg-gray-200 rounded border" aria-pressed="false" aria-label="Expand all users">+</button>
          <h1 class="text-3xl font-bold">Modify Users</h1>
          <div class="ml-auto flex items-center">
            <label class="flex items-center text-sm text-gray-800"><span>Show Inactive</span><input type="checkbox" class="show-inactive-users-toggle ml-2" aria-label="Show inactive users"></label>
          </div>
        </div>
        <div class="grid md:grid-cols-[1fr_1fr_auto] gap-3 py-4 items-center">
          <input id="users-admin-new-user-email" type="email" class="border rounded p-2" placeholder="Email">
          <input id="users-admin-new-user-password" type="password" class="border rounded p-2" placeholder="Password">
          <button id="users-admin-create-user-btn" class="bg-blue-600 text-white px-4 py-2 rounded">Create User</button>
        </div>
        <p id="user-admin-create-status" class="text-sm text-gray-800"></p>
        <p id="users-admin-edit-status" class="text-sm text-gray-800"></p>
        <div id="users-admin-edit-list" class="space-y-3"></div>
      </div>
    </section>
    
    <section class="flex-1 p-6 max-w-3xl mx-auto w-full">
      <div class="bg-white p-6 rounded-lg shadow">
        <h1 class="text-3xl font-bold mb-4">Modify Dashboard</h1>

        <div class="space-y-6">
          <div>
            <h2 class="text-lg font-semibold mb-2">Banner Message</h2>
            <div class="space-y-3">
              <div>
                <label class="block text-sm font-medium mb-1">Banner Text</label>
                <textarea id="admin-banner-text" class="border p-2 w-full rounded" rows="2"></textarea>
              </div>
              <div class="grid grid-cols-4 gap-3">
                <div>
                  <label class="block text-sm font-medium mb-1">Background Color</label>
                  <input id="admin-banner-bg" type="color" class="w-20 h-10 p-0 border rounded">
                </div>
                <div>
                  <label class="block text-sm font-medium mb-1">Text Color</label>
                  <input id="admin-banner-text-color" type="color" class="w-20 h-10 p-0 border rounded">
                </div>
              </div>
              <label class="flex items-center gap-2"><input id="admin-banner-enabled" type="checkbox"> Enable Banner Message</label>
              <div class="mt-2">
                <button id="admin-banner-save" class="bg-blue-600 text-white px-4 py-2 rounded">Save Banner</button>
                <span id="admin-banner-status" class="text-sm text-gray-800"></span>
              </div>
            </div>
          </div>

          <hr class="border-t border-gray-300 my-6">

          <div>
            <h2 class="text-lg font-semibold mb-2">External Links</h2>
            <div id="admin-links-editor" class="space-y-3">
                <div id="admin-links-grid" class="grid grid-cols-5 gap-2">
                  <!-- 15 tiles (5 columns x 3 rows) populated by JS -->
                </div>

                <div class="mt-2 grid grid-cols-1 md:grid-cols-3 gap-3">
                  <div class="md:col-span-1">
                    <label class="block text-sm font-medium mb-1">Label</label>
                    <input id="admin-link-text" type="text" class="border p-2 w-full rounded">
                  </div>
                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium mb-1">Link</label>
                    <input id="admin-link-url" type="url" class="border p-2 w-full rounded">
                  </div>
                </div>

                <div class="mt-2">
                  <button id="admin-link-save" class="bg-blue-600 text-white px-4 py-2 rounded">Save Links</button>
                  <button id="admin-link-clear" class="bg-gray-600 text-white px-4 py-2 rounded ml-2">Clear Tile</button>
                  <button id="admin-link-reset-all" class="bg-red-600 text-white px-4 py-2 rounded ml-2">Reset All</button>
                  <span id="admin-links-status" class="ml-3 text-sm text-gray-800"></span>
                </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { mountAdminPage } from "/js/admin.js";
    await mountAdminPage();
  </script>
</body>
</html>
