<!DOCTYPE html>
<html>
<head>
  <title>Admin – BBC Ledger</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6 max-w-5xl mx-auto w-full">
    <div class="space-y-6">
      <div class="mb-6">
        <h1 class="text-3xl font-bold">Admin</h1>
      </div>

      <section class="bg-white p-6 rounded-lg shadow space-y-4">
        <h2 class="text-2xl font-bold">Family Assignment</h2>
        <div>
          <label class="block text-sm font-medium mb-1">Linked Login Emails</label>
          <p id="admin-linked-family-emails" class="text-sm text-gray-700 border rounded p-2 bg-gray-50">Loading…</p>
        </div>
        <div class="grid md:grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium mb-1">Add Linked Login Email</label>
            <input id="admin-link-family-email" type="email" class="border p-2 w-full rounded" placeholder="member@example.com">
          </div>
          <div class="flex items-end">
            <button id="admin-link-family-email-btn" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Link Email To Family</button>
          </div>
        </div>
        <p id="admin-family-message" class="text-sm text-gray-700"></p>
      </section>

      <section class="bg-white p-6 rounded-lg shadow space-y-4">
        <h2 class="text-2xl font-bold">Admin Profile Fields</h2>
        <p class="text-sm text-gray-600">Admin notes shown to users in profile.</p>
        <div class="grid md:grid-cols-3 gap-3">
          <div>
            <label class="block text-sm font-medium mb-1">Date Joined</label>
            <input id="admin-date-joined" type="date" class="border p-2 w-full rounded">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Date Last Background Check</label>
            <input id="admin-last-background-check" type="date" class="border p-2 w-full rounded">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Date Last Dues Payment</label>
            <input id="admin-last-dues-payment" type="date" class="border p-2 w-full rounded">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">General Notes</label>
          <textarea id="admin-general-notes" class="border p-2 w-full rounded" rows="4"></textarea>
        </div>

        <div class="text-sm text-gray-700 border-t pt-3">
          <p class="font-semibold mb-1">Planned Admin Tools</p>
          <ul class="list-disc pl-5 space-y-1">
            <li>User creation</li>
            <li>User deactivation/reactivation</li>
            <li>Send email to all active users</li>
            <li>Create/edit banner message</li>
            <li>Create/edit dashboard external links</li>
          </ul>
        </div>

        <button id="admin-save-btn" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Save Admin Fields</button>
        <p id="admin-save-message" class="text-sm text-gray-700"></p>
      </section>
    </div>
  </main>

  <script type="module">
    import { setupNavbar } from "/js/utils.js";
    import { mountAdminPage } from "/js/admin.js";

    await setupNavbar("navbar");
    await mountAdminPage();
  </script>
</body>
</html>
