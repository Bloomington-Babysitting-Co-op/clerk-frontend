<!DOCTYPE html>
<html>
<head>
  <title>Edit Entry – BBC Ledger</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex flex-col min-h-screen bg-gray-50">
  <nav id="navbar"></nav>

  <main class="flex-1 p-6 max-w-3xl mx-auto w-full">
    <div class="bg-white p-6 rounded-lg shadow">
      <h1 class="text-2xl font-bold mb-4">Edit Entry (Admin)</h1>

      <label class="block mb-2 font-semibold">From User</label>
      <select id="from-user" class="border p-2 w-full mb-4"></select>

      <label class="block mb-2 font-semibold">To User</label>
      <select id="to-user" class="border p-2 w-full mb-4"></select>

      <label class="block mb-2 font-semibold">Hours</label>
      <input id="hours" type="number" step="0.25" min="0" class="border p-2 w-full mb-4">

      <label class="block mb-2 font-semibold">Entry date</label>
      <input id="entry-date" type="datetime-local" required class="border p-2 w-full mb-4">

      <button id="save-entry-btn" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Save Entry</button>
      <p id="entry-error" class="text-red-600 mt-3"></p>
    </div>
  </main>

  <script type="module">
    import { setupNavbar } from "/js/utils.js";
    import { mountEditEntryPage } from "/js/entries.js";

    await setupNavbar("navbar");
    await mountEditEntryPage();
  </script>
</body>
</html>
